server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/polis
    username: polis
    password: polis
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

polis:
  jwt:
    secret: ${POLIS_JWT_SECRET:dev-secret-change-me-please-32bytes-minimum!!}
    ttl-hours: 72
  tick:
    interval-ms: 5000

logging:
  level:
    org.hibernate.SQL: warn
