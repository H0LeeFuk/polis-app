server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/polis;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration-h2

polis:
  jwt:
    secret: ${POLIS_JWT_SECRET:dev-secret-change-me-please-32bytes-minimum!!}
    ttl-hours: 72
  tick:
    interval-ms: 5000

logging:
  level:
    org.hibernate.SQL: warn
